{% set name = "python-dateutil" %}
{% set version = "2.9.0.post0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/66/c0/0c8b6ad9f17a802ee498c46e004a0eb49bc148f2fd230864601a86dcf6db/{{ name }}-{{ version }}.tar.gz
  sha256: 37dd54208da7e1cd875388217d5e00ebd4179249f90fb72437e91a35459a0ad3

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -v

requirements:
  host:
    - python >=2.7,!=3.0.*,!=3.1.*,!=3.2.*
    - pip
    - setuptools
  run:
    - python >=2.7,!=3.0.*,!=3.1.*,!=3.2.*
    - six >=1.5

test:
  imports:
    - dateutil
    - dateutil.parser
    - dateutil.tz
    - dateutil.relativedelta
  commands:
    - pip check

about:
  home: https://github.com/dateutil/dateutil
  license: Apache-2.0 AND BSD-3-Clause
  license_file: LICENSE
  summary: Extensions to the standard Python datetime module
  description: |
    The dateutil module provides powerful extensions to the standard datetime
    module, available in Python 2.7+.
  doc_url: https://dateutil.readthedocs.io
  dev_url: https://github.com/dateutil/dateutil

extra:
  recipe-maintainers:
    - anaconda-packaging
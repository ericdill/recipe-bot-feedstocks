{% set name = "pydantic" %}
{% set version = "1.10.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
source:
  url: https://files.pythonhosted.org/packages/86/83/0fed6af08fec0f29e7b02ead602393b0cac8dfb99cfc4b0816784ab28e2e/pydantic-1.10.0.tar.gz
  sha256: e13788fcad1baf5eb3236856b2a9a74f7dac6b3ea7ca1f60a4ad8bad4239cf4c

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -v

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    # build_backend_requires is null; pydantic 1.x uses setuptools with Cython extensions
    - setuptools
    - cython
  run:
    - python
    - typing-extensions >=4.1.0

test:
  imports:
    - pydantic
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/pydantic/pydantic
  license: MIT
  license_file: LICENSE
  summary: Data validation and settings management using python type hints
  description: |
    Data validation and settings management using Python type hints.
    pydantic enforces type hints at runtime, and provides user friendly
    errors when data is invalid.
  doc_url: https://docs.pydantic.dev/
  dev_url: https://github.com/pydantic/pydantic
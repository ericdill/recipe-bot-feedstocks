{% set name = "click" %}
{% set version = "8.1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/96/d3/f04c7bfcf5c1862a2a5b845c6b2b360488cf47af55dfa79c98f6a6bf98b5/{{ name }}-{{ version }}.tar.gz
  sha256: ca9853ad459e787e2192211578cc907e7594e294c7ccc834310722b41b9ca6de

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -q

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - colorama  # [win]
    - importlib-metadata  # [py<38]

test:
  imports:
    - click
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://palletsprojects.com/p/click/
  summary: Composable command line interface toolkit
  license: BSD-3-Clause
  license_file: LICENSE.rst
  doc_url: https://click.palletsprojects.com/
  dev_url: https://github.com/pallets/click

extra:
  recipe-maintainers:
    - anaconda-packaging
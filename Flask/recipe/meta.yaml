{% set name = "flask" %}
{% set version = "3.1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/c0/de/e47735752347f4128bcf354e0da07ef311a78244eba9e3dc1d4a5ab21a98/{{ name }}-{{ version }}.tar.gz
  sha256: 284c7b8f2f58cb737f0cf1c30fd7eaf0ccfcde196099d24ecede3fc2005aa59e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -q

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - blinker >=1.9.0
    - click >=8.1.3
    - importlib-metadata >=3.6.0  # [py<310]
    - itsdangerous >=2.2.0
    - jinja2 >=3.1.2
    - markupsafe >=2.1.1
    - werkzeug >=3.1.0

test:
  imports:
    - flask
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://flask.palletsprojects.com/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A simple framework for building complex web applications.
  description: |
    Flask is a lightweight WSGI web application framework. It is designed to
    make getting started quick and easy, with the ability to scale up to
    complex applications.
  doc_url: https://flask.palletsprojects.com/
  dev_url: https://github.com/pallets/flask

extra:
  recipe-maintainers:
    - anaconda-recipes
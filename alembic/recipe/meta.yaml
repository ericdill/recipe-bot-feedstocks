{% set name = "alembic" %}
{% set version = "1.13.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/7b/24/ddce068e2ac9b5581bd58602edb2a1be1b0752e1ff2963c696ecdbe0470d/{{ name }}-{{ version }}.tar.gz
  sha256: 4932c8558bf68f2ee92b9bbcb8218671c627064d5b08939437af6d77dc05e595

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -q

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=47
  run:
    - python >=3.8
    - sqlalchemy >=1.3.0
    - mako
    - importlib-metadata  # [py<39]
    - importlib-resources  # [py<39]
    - typing-extensions >=4

test:
  imports:
    - alembic
    - alembic.autogenerate
    - alembic.operations
    - alembic.runtime
  commands:
    - pip check
    - alembic --help
  requires:
    - pip

about:
  home: https://alembic.sqlalchemy.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A database migration tool for SQLAlchemy.
  description: |
    Alembic is a lightweight database migration tool for usage with the
    SQLAlchemy Database Toolkit for Python.
  doc_url: https://alembic.sqlalchemy.org/en/latest/
  dev_url: https://github.com/sqlalchemy/alembic

extra:
  recipe-maintainers:
    - anaconda-packages
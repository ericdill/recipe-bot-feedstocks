{% set name = "expat" %}
{% set version = "2.8.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/libexpat/libexpat/releases/download/R_{{ version.replace('.', '_') }}/expat-{{ version }}.tar.gz
  sha256: 0f24b43586e8b36380f6e0cb1a0aeecb12cd6cd90b01b0d4b74b89d2f4e6abb1

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - cmake
    - make  # [not win]
  host: []
  run: []

test:
  commands:
    - xmlwf -h 2>&1 | grep -i usage  # [not win]
    - xmlwf -h  # [win]

about:
  home: https://libexpat.github.io/
  license: MIT
  license_family: MIT
  license_file: COPYING
  summary: An XML parser library written in C
  description: |
    Expat is a stream-oriented XML parser library written in C. It excels
    with files too large to fit RAM, and where performance and flexibility
    are crucial.
  doc_url: https://libexpat.github.io/doc/
  dev_url: https://github.com/libexpat/libexpat

extra:
  recipe-maintainers:
    - conda-forge/core

